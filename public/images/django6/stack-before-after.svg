<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280" font-family="system-ui,-apple-system,sans-serif"><rect width="720" height="280" fill="#fafafa" rx="12"/><text x="360" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#171717">Stack: Before and After</text><line x1="360" y1="44" x2="360" y2="264" stroke="#e5e5e5" stroke-dasharray="4,4"/><text x="180" y="60" text-anchor="middle" font-size="13" font-weight="600" fill="#737373">Before (Django 3 / Python 3.9)</text><rect x="40" y="74" width="280" height="30" rx="5" fill="#fef2f2" stroke="#dc2626"/><text x="180" y="94" text-anchor="middle" font-size="12" fill="#dc2626">uWSGI (WSGI only)</text><rect x="40" y="112" width="280" height="30" rx="5" fill="#fef2f2" stroke="#dc2626"/><text x="180" y="132" text-anchor="middle" font-size="12" fill="#dc2626">ws4redis (abandoned, patched)</text><rect x="40" y="150" width="280" height="30" rx="5" fill="#fff" stroke="#d4d4d4"/><text x="180" y="170" text-anchor="middle" font-size="12" fill="#525252">Django 3 / Python 3.9</text><rect x="40" y="188" width="280" height="30" rx="5" fill="#fff" stroke="#d4d4d4"/><text x="180" y="208" text-anchor="middle" font-size="12" fill="#525252">django-rest-knox 3</text><rect x="40" y="226" width="280" height="30" rx="5" fill="#fff" stroke="#d4d4d4"/><text x="180" y="246" text-anchor="middle" font-size="12" fill="#525252">HTTP health probes</text><text x="540" y="60" text-anchor="middle" font-size="13" font-weight="600" fill="#737373">After (Django 6 / Python 3.12)</text><rect x="400" y="74" width="280" height="30" rx="5" fill="#f0fdf4" stroke="#16a34a"/><text x="540" y="94" text-anchor="middle" font-size="12" fill="#16a34a">Gunicorn + Uvicorn (ASGI)</text><rect x="400" y="112" width="280" height="30" rx="5" fill="#f0fdf4" stroke="#16a34a"/><text x="540" y="132" text-anchor="middle" font-size="12" fill="#16a34a">django-channels + Redis Pub/Sub</text><rect x="400" y="150" width="280" height="30" rx="5" fill="#fff" stroke="#d