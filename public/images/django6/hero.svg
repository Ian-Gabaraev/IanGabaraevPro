<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="system-ui,-apple-system,sans-serif">
  <!-- Dark dramatic background -->
  <rect width="1200" height="630" fill="#0f172a"/>

  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dc2626" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="greenGlow" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#16a34a" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Top red glow (danger zone) -->
  <rect width="1200" height="300" fill="url(#glow)"/>

  <!-- Bottom green glow (resolution) -->
  <rect y="330" width="1200" height="300" fill="url(#greenGlow)"/>

  <!-- Decorative connection lines (like network/infra) -->
  <line x1="100" y1="200" x2="400" y2="315" stroke="#334155" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="800" y1="200" x2="600" y2="315" stroke="#334155" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="400" y1="315" x2="600" y2="315" stroke="#475569" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="100" y1="200" x2="500" y2="200" stroke="#334155" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="700" y1="200" x2="1100" y2="200" stroke="#334155" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- Django box (left) -->
  <rect x="60" y="165" width="160" height="70" rx="10" fill="#0f172a" stroke="#16a34a" stroke-width="2"/>
  <text x="140" y="192" text-anchor="middle" font-size="11" fill="#4ade80" font-weight="600" letter-spacing="2">DJANGO</text>
  <text x="140" y="215" text-anchor="middle" font-size="28" fill="#f8fafc" font-weight="800">6</text>

  <!-- Redis box (right) -->
  <rect x="980" y="165" width="160" height="70" rx="10" fill="#0f172a" stroke="#dc2626" stroke-width="2"/>
  <text x="1060" y="192" text-anchor="middle" font-size="11" fill="#f87171" font-weight="600" letter-spacing="2">REDIS</text>
  <text x="1060" y="220" text-anchor="middle" font-size="14" fill="#94a3b8" font-weight="500">Pub/Sub</text>

  <!-- Channels box (center-left) -->
  <rect x="330" y="165" width="180" height="70" rx="10" fill="#0f172a" stroke="#7c3aed" stroke-width="2"/>
  <text x="420" y="192" text-anchor="middle" font-size="11" fill="#a78bfa" font-weight="600" letter-spacing="2">CHANNELS</text>
  <text x="420" y="218" text-anchor="middle" font-size="14" fill="#94a3b8" font-weight="500">ASGI + WebSockets</text>

  <!-- Azure box (center-right) -->
  <rect x="690" y="165" width="180" height="70" rx="10" fill="#0f172a" stroke="#0ea5e9" stroke-width="2"/>
  <text x="780" y="192" text-anchor="middle" font-size="11" fill="#38bdf8" font-weight="600" letter-spacing="2">AZURE</text>
  <text x="780" y="218" text-anchor="middle" font-size="14" fill="#94a3b8" font-weight="500">500+ Containers</text>

  <!-- Connection dots -->
  <circle cx="220" cy="200" r="4" fill="#16a34a" opacity="0.8"/>
  <circle cx="330" cy="200" r="4" fill="#7c3aed" opacity="0.8"/>
  <circle cx="510" cy="200" r="4" fill="#7c3aed" opacity="0.8"/>
  <circle cx="690" cy="200" r="4" fill="#0ea5e9" opacity="0.8"/>
  <circle cx="870" cy="200" r="4" fill="#0ea5e9" opacity="0.8"/>
  <circle cx="980" cy="200" r="4" fill="#dc2626" opacity="0.8"/>

  <!-- Central dramatic title -->
  <text x="600" y="340" text-anchor="middle" font-size="48" fill="#f8fafc" font-weight="800" letter-spacing="-1">EVERYTHING THAT WENT WRONG</text>

  <!-- Subtitle -->
  <text x="600" y="385" text-anchor="middle" font-size="18" fill="#64748b" font-weight="400">Django 3 → 5 → 6  ·  Python 3.9 → 3.12  ·  6 months  ·  1 outage</text>

  <!-- Version path with arrows at bottom -->
  <rect x="200" y="440" width="120" height="44" rx="8" fill="#0f172a" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="260" y="458" text-anchor="middle" font-size="10" fill="#f87171" font-weight="600">DJANGO 3</text>
  <text x="260" y="474" text-anchor="middle" font-size="10" fill="#475569">Python 3.9</text>

  <!-- Arrow 1 -->
  <path d="M325,462 L385,462" stroke="#475569" stroke-width="1.5"/>
  <path d="M380,457 L390,462 L380,467" fill="#475569"/>

  <rect x="395" y="440" width="120" height="44" rx="8" fill="#0f172a" stroke="#d97706" stroke-width="1.5"/>
  <text x="455" y="458" text-anchor="middle" font-size="10" fill="#fbbf24" font-weight="600">DJANGO 5</text>
  <text x="455" y="474" text-anchor="middle" font-size="10" fill="#475569">Python 3.11</text>

  <!-- Arrow 2 -->
  <path d="M520,462 L580,462" stroke="#475569" stroke-width="1.5"/>
  <path d="M575,457 L585,462 L575,467" fill="#475569"/>

  <rect x="590" y="440" width="120" height="44" rx="8" fill="#0f172a" stroke="#16a34a" stroke-width="2"/>
  <text x="650" y="458" text-anchor="middle" font-size="10" fill="#4ade80" font-weight="600">DJANGO 6</text>
  <text x="650" y="474" text-anchor="middle" font-size="10" fill="#475569">Python 3.12</text>

  <!-- Explosion/warning icons scattered -->
  <text x="150" y="100" font-size="20" fill="#dc2626" opacity="0.3">⚠</text>
  <text x="950" y="120" font-size="16" fill="#dc2626" opacity="0.25">⚠</text>
  <text x="550" y="130" font-size="24" fill="#dc2626" opacity="0.2">⚠</text>
  <text x="350" y="540" font-size="14" fill="#16a34a" opacity="0.3">✓</text>
  <text x="750" y="550" font-size="14" fill="#16a34a" opacity="0.3">✓</text>

  <!-- Bottom tagline -->
  <text x="600" y="560" text-anchor="middle" font-size="13" fill="#475569">A war story about WebSockets, cascading failures, and the hacks that saved production</text>

  <!-- Author -->
  <text x="600" y="590" text-anchor="middle" font-size="12" fill="#334155">Ian Gabaraev · iangabaraev.com</text>
</svg>

