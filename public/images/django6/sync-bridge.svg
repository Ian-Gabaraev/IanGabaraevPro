<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" font-family="system-ui,-apple-system,sans-serif"><defs><marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#a3a3a3"/></marker></defs><rect width="720" height="300" fill="#fafafa" rx="12"/><text x="360" y="32" text-anchor="middle" font-size="16" font-weight="700" fill="#171717">Sync to WebSocket: Bridge vs Direct Publish</text><line x1="360" y1="50" x2="360" y2="280" stroke="#e5e5e5" stroke-dasharray="4,4"/><text x="180" y="64" text-anchor="middle" font-size="13" font-weight="600" fill="#dc2626">Through django-channels</text><rect x="60" y="80" width="240" height="34" rx="6" fill="#fff" stroke="#d4d4d4"/><text x="180" y="102" text-anchor="middle" font-size="12" fill="#171717">Sync view calls group_send()</text><path d="M180,114 L180,132" fill="none" stroke="#a3a3a3" stroke-width="1.5" marker-end="url(#a)"/><rect x="60" y="134" width="240" height="34" rx="6" fill="#fef2f2" stroke="#dc2626"/><text x="180" y="156" text-anchor="middle" font-size="12" fill="#dc2626" font-weight="600">async_to_sync() bridge</text><path d="M180,168 L180,186" fill="none" stroke="#a3a3a3" stroke-width="1.5" marker-end="url(#a)"/><rect x="60" y="188" width="240" height="34" rx="6" fill="#fef2f2" stroke="#dc2626"/><text x="180" y="210" text-anchor="middle" font-size="12" fill="#dc2626">Acquire event loop + block thread</text><path d="M180,222 L180,240" fill="none" stroke="#a3a3a3" stroke-width="1.5" marker-end="url(#a)"/><rect x="108" y="242" width="144" height="24" rx="4" fill="#dc2626" fill-opacity="0.15"/><text x="180" y="259" text-anchor="middle" font-size="11" fill="#dc2626" font-weight="700">+50ms per call</text><text x="540" y="64" text-anchor="middle" font-size="13" font-weight="600" fill="#16a34a">Direct Redis publish</text><rect x="420" y="80" width="240" height="34" rx="6" fill="#fff" stroke="#d4d4d4"/><text x="540" y="102" text-anchor="middle" font-size="12" fill="#171717">Sync view calls send_ws()</text><path d="M540,114 L540,132" fill="none" stroke="#a3a3a3" stroke-width="1.5" marker-end="url(#a)"/><rect x="420" y="134" width="240" height="34" rx="6" fill="#f0fdf4" stroke="#16a34a"/><text x="540" y="156" text-anchor="middle" font-size="12" fill="#16a34a">Serialize + redis.publish()</text><path d="M540,168 L540,186" fill="none" stroke="#a3a3a3" stroke-width="1.5" marker-end="url(#a)"/><rect x="468" y="188" width="144" height="24" rx="4" fill="#16a34a" fill-opacity="0.15"/><text x="540" y="205" text-anchor="middle" font-size="11" fill="#16a34a" font-weight="700">~0ms overhead</text></svg>

