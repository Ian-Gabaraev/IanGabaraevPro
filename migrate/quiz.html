<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frontend Interview Quiz</title>
  <style>
    :root {
      --primary: #60a5fa;
      --primary-dark: #3b82f6;
      --primary-glow: rgba(96, 165, 250, 0.3);
      --success: #34d399;
      --success-glow: rgba(52, 211, 153, 0.3);
      --error: #f87171;
      --error-glow: rgba(248, 113, 113, 0.3);
      --warning: #fbbf24;
      --purple: #a78bfa;
      --pink: #f472b6;
      --cyan: #22d3ee;
      --bg-start: #0f0f1a;
      --bg-end: #1a1a2e;
      --card-bg: rgba(30, 30, 50, 0.7);
      --card-border: rgba(255, 255, 255, 0.1);
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --border: rgba(255, 255, 255, 0.08);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%);
      background-attachment: fixed;
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      padding: 2rem;
      position: relative;
    }

    /* Subtle code pattern overlay */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: 
        radial-gradient(circle at 25% 25%, rgba(96, 165, 250, 0.03) 0%, transparent 50%),
        radial-gradient(circle at 75% 75%, rgba(167, 139, 250, 0.03) 0%, transparent 50%);
      pointer-events: none;
      z-index: -1;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      margin-bottom: 0.5rem;
      font-size: 2.25rem;
      background: linear-gradient(135deg, var(--primary) 0%, var(--purple) 50%, var(--pink) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      text-align: center;
      color: var(--text-muted);
      margin-bottom: 2rem;
      font-size: 1rem;
    }

    .progress-bar {
      background: var(--border);
      border-radius: 10px;
      height: 8px;
      margin-bottom: 2rem;
      overflow: hidden;
      box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.3);
    }

    .progress-fill {
      background: linear-gradient(90deg, var(--primary) 0%, var(--purple) 100%);
      height: 100%;
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 0 20px var(--primary-glow);
    }

    .score-display {
      text-align: center;
      font-size: 1.1rem;
      margin-bottom: 1.5rem;
      color: var(--text-muted);
    }

    .score-display span {
      color: var(--cyan);
      font-weight: bold;
      text-shadow: 0 0 10px rgba(34, 211, 238, 0.5);
    }

    .quiz-card {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 2rem;
      margin-bottom: 1.5rem;
      box-shadow: 
        0 4px 30px rgba(0, 0, 0, 0.3),
        0 0 40px rgba(96, 165, 250, 0.05);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .quiz-card:hover {
      transform: translateY(-2px);
      box-shadow: 
        0 8px 40px rgba(0, 0, 0, 0.4),
        0 0 60px rgba(96, 165, 250, 0.08);
    }

    .question-number {
      color: var(--cyan);
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .question-text {
      font-size: 1.25rem;
      margin-bottom: 1.5rem;
      font-weight: 500;
    }

    .code-block {
      background: linear-gradient(145deg, #1e1e2e 0%, #16161e 100%);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 1.25rem;
      margin: 1rem 0;
      font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
      font-size: 0.9rem;
      overflow-x: auto;
      white-space: pre;
      box-shadow: 
        inset 0 2px 10px rgba(0, 0, 0, 0.3),
        0 0 20px rgba(0, 0, 0, 0.2);
      position: relative;
    }

    .code-block::before {
      content: '//';
      position: absolute;
      top: 0.75rem;
      right: 1rem;
      color: var(--text-muted);
      opacity: 0.3;
      font-size: 0.75rem;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .option {
      background: rgba(255, 255, 255, 0.03);
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 1rem 1.25rem;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .option:hover:not(.disabled) {
      border-color: var(--primary);
      background: rgba(96, 165, 250, 0.08);
      transform: translateX(4px);
      box-shadow: 0 0 20px var(--primary-glow);
    }

    .option.selected {
      border-color: var(--primary);
      background: rgba(96, 165, 250, 0.12);
      box-shadow: 0 0 25px var(--primary-glow);
    }

    .option.correct {
      border-color: var(--success);
      background: rgba(52, 211, 153, 0.12);
      box-shadow: 0 0 25px var(--success-glow);
      animation: correctPulse 0.5s ease;
    }

    .option.incorrect {
      border-color: var(--error);
      background: rgba(248, 113, 113, 0.12);
      box-shadow: 0 0 25px var(--error-glow);
      animation: shake 0.5s ease;
    }

    @keyframes correctPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-5px); }
      40% { transform: translateX(5px); }
      60% { transform: translateX(-5px); }
      80% { transform: translateX(5px); }
    }

    .option.disabled {
      cursor: not-allowed;
      opacity: 0.6;
    }

    .option-letter {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 0.85rem;
      flex-shrink: 0;
      transition: all 0.3s ease;
    }

    .option:hover:not(.disabled) .option-letter {
      background: var(--primary);
      box-shadow: 0 0 15px var(--primary-glow);
    }

    .option.correct .option-letter {
      background: var(--success);
      box-shadow: 0 0 15px var(--success-glow);
    }

    .option.incorrect .option-letter {
      background: var(--error);
      box-shadow: 0 0 15px var(--error-glow);
    }

    .explanation {
      margin-top: 1.5rem;
      padding: 1.25rem;
      background: linear-gradient(135deg, rgba(96, 165, 250, 0.1) 0%, rgba(167, 139, 250, 0.1) 100%);
      border-left: 4px solid var(--purple);
      border-radius: 0 12px 12px 0;
      display: none;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .explanation.show {
      display: block;
    }

    .explanation-title {
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: var(--purple);
    }

    .btn {
      background: linear-gradient(135deg, var(--primary) 0%, var(--purple) 100%);
      color: white;
      border: none;
      padding: 0.875rem 2rem;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 15px rgba(96, 165, 250, 0.3);
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 25px rgba(96, 165, 250, 0.4);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .btn-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 1.5rem;
    }

    .results {
      text-align: center;
      padding: 3rem 2rem;
    }

    .results h2 {
      font-size: 2rem;
      margin-bottom: 1rem;
      background: linear-gradient(135deg, var(--text) 0%, var(--text-muted) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .results-score {
      font-size: 5rem;
      font-weight: bold;
      background: linear-gradient(135deg, var(--cyan) 0%, var(--primary) 50%, var(--purple) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin: 1.5rem 0;
      text-shadow: 0 0 60px var(--primary-glow);
    }

    .results-message {
      font-size: 1.25rem;
      color: var(--text-muted);
      margin-bottom: 2rem;
    }

    .category-select {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      justify-content: center;
      margin-bottom: 2rem;
    }

    .category-btn, .size-btn {
      background: rgba(255, 255, 255, 0.03);
      border: 2px solid var(--border);
      color: var(--text);
      padding: 0.625rem 1.25rem;
      border-radius: 25px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      font-size: 0.9rem;
      font-weight: 500;
    }

    .category-btn:hover, .size-btn:hover {
      border-color: var(--primary);
      background: rgba(96, 165, 250, 0.1);
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(96, 165, 250, 0.2);
    }

    .category-btn.active, .size-btn.active {
      border-color: var(--purple);
      background: linear-gradient(135deg, rgba(96, 165, 250, 0.15) 0%, rgba(167, 139, 250, 0.15) 100%);
      box-shadow: 0 0 20px rgba(167, 139, 250, 0.2);
    }

    .start-screen {
      text-align: center;
      padding: 2.5rem;
    }

    .start-screen h2 {
      margin-bottom: 1rem;
      color: var(--text);
      font-size: 1.5rem;
    }

    .start-screen p {
      color: var(--text-muted);
      margin-bottom: 1.5rem;
    }

    .hidden {
      display: none !important;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-muted);
      text-decoration: none;
      margin-bottom: 1.5rem;
      font-size: 0.9rem;
      transition: color 0.2s ease;
    }

    .back-link:hover {
      color: var(--primary);
    }

    @media (max-width: 600px) {
      body {
        padding: 1rem;
      }

      h1 {
        font-size: 1.5rem;
      }

      .quiz-card {
        padding: 1.25rem;
      }

      .question-text {
        font-size: 1.1rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="./" class="back-link">← Back to Study Guide</a>
    
    <h1>🧠 Frontend Interview Quiz</h1>
    <p class="subtitle">Test your JavaScript, TypeScript & React knowledge</p>

    <!-- Start Screen -->
    <div id="start-screen" class="quiz-card start-screen">
      <h2>Choose a Category</h2>
      <p>Select one or more topics to quiz yourself on:</p>
      
      <div class="category-select">
        <button class="category-btn active" data-category="all">All Topics</button>
        <button class="category-btn" data-category="js-gotchas">JS Gotchas</button>
        <button class="category-btn" data-category="js-concepts">JS Concepts</button>
        <button class="category-btn" data-category="typescript">TypeScript</button>
        <button class="category-btn" data-category="react">React (All)</button>
        <button class="category-btn" data-category="react-core">React: State & Props</button>
        <button class="category-btn" data-category="node">Node.js</button>
      </div>

      <h2 style="margin-top: 1.5rem;">Quiz Size</h2>
      <p>How many questions?</p>
      
      <div class="category-select">
        <button class="size-btn active" data-size="10">10 Questions</button>
        <button class="size-btn" data-size="20">20 Questions</button>
        <button class="size-btn" data-size="30">30 Questions</button>
        <button class="size-btn" data-size="0">All Available</button>
      </div>

      <button class="btn" onclick="startQuiz()">Start Quiz</button>
    </div>

    <!-- Quiz Screen -->
    <div id="quiz-screen" class="hidden">
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
      </div>

      <div class="score-display">
        Score: <span id="current-score">0</span> / <span id="total-questions">0</span>
      </div>

      <div class="quiz-card" id="question-card">
        <div class="question-number" id="question-number">Question 1</div>
        <div class="question-text" id="question-text"></div>
        <div class="code-block hidden" id="code-block"></div>
        <div class="options" id="options"></div>
        <div class="explanation" id="explanation">
          <div class="explanation-title">💡 Explanation</div>
          <div id="explanation-text"></div>
        </div>
      </div>

      <div class="btn-container">
        <div></div>
        <button class="btn" id="next-btn" onclick="nextQuestion()" disabled>Next Question</button>
      </div>
    </div>

    <!-- Results Screen -->
    <div id="results-screen" class="quiz-card hidden results">
      <h2>Quiz Complete!</h2>
      <div class="results-score" id="final-score">0%</div>
      <div class="results-message" id="results-message"></div>
      <button class="btn" onclick="resetQuiz()">Try Again</button>
    </div>
  </div>

  <script>
    // Quiz Questions Database
    const questions = {
      'js-gotchas': [
        {
          question: "What does this code output?",
          code: `console.log(typeof null)`,
          options: ["\"null\"", "\"undefined\"", "\"object\"", "null"],
          correct: 2,
          explanation: "This is a historical bug in JavaScript. typeof null returns \"object\" even though null is a primitive. This was never fixed for backward compatibility."
        },
        {
          question: "What does this code output?",
          code: `console.log(typeof [])`,
          options: ["\"array\"", "\"object\"", "\"Array\"", "\"undefined\""],
          correct: 1,
          explanation: "Arrays are objects in JavaScript. typeof [] returns \"object\". Use Array.isArray([]) to check for arrays."
        },
        {
          question: "What does this code output?",
          code: `console.log([] + [])`,
          options: ["[]", "0", "\"\"", "undefined"],
          correct: 2,
          explanation: "The + operator converts arrays to primitives via .toString(). Empty arrays become empty strings, so \"\" + \"\" equals \"\"."
        },
        {
          question: "What does this code output?",
          code: `console.log("A")\nsetTimeout(() => console.log("B"), 0)\nconsole.log("C")`,
          options: ["A B C", "A C B", "B A C", "C A B"],
          correct: 1,
          explanation: "setTimeout callbacks go into the event loop and execute after the current call stack is empty, even with 0ms delay. So: A, C (sync), then B (async)."
        },
        {
          question: "What does this code output?",
          code: `for (var i = 0; i < 3; i++) {\n  setTimeout(() => console.log(i), 0)\n}`,
          options: ["0 1 2", "3 3 3", "0 0 0", "undefined undefined undefined"],
          correct: 1,
          explanation: "var is function-scoped, not block-scoped. When the callbacks run, the loop has finished and i equals 3. Use let instead to fix this."
        },
        {
          question: "What does this code output?",
          code: `const nums = [1, 2, 3]\nconst result = nums.map(n => { n * 2 })\nconsole.log(result)`,
          options: ["[2, 4, 6]", "[undefined, undefined, undefined]", "[]", "Error"],
          correct: 1,
          explanation: "Arrow functions with {} need an explicit return statement. Without return, the function returns undefined. Use n => n * 2 or n => { return n * 2 }."
        },
        {
          question: "What does this code output?",
          code: `const a = { x: 1 }\nconst b = { x: 1 }\nconsole.log(a === b)`,
          options: ["true", "false", "undefined", "Error"],
          correct: 1,
          explanation: "=== compares by reference for objects, not by value. a and b are different objects in memory, so they're not equal."
        },
        {
          question: "What does this code output?",
          code: `console.log(0.1 + 0.2 === 0.3)`,
          options: ["true", "false", "0.3", "Error"],
          correct: 1,
          explanation: "Floating point arithmetic in JavaScript (and most languages) has precision issues. 0.1 + 0.2 equals 0.30000000000000004, not exactly 0.3."
        },
        {
          question: "What does this code output?",
          code: `console.log([] == ![])`,
          options: ["true", "false", "Error", "undefined"],
          correct: 0,
          explanation: "![] is false (arrays are truthy, negated = false). [] == false coerces: [] → '' → 0, false → 0. 0 == 0 is true. Wild type coercion!"
        },
        {
          question: "What does this code output?",
          code: `console.log('5' - 3)`,
          options: ["'53'", "2", "NaN", "Error"],
          correct: 1,
          explanation: "The - operator only works with numbers, so '5' is coerced to 5. 5 - 3 = 2. But + would concatenate: '5' + 3 = '53'."
        },
        {
          question: "What does this code output?",
          code: `const arr = [1, 2, 3]\narr[10] = 11\nconsole.log(arr.length)`,
          options: ["4", "11", "10", "Error"],
          correct: 1,
          explanation: "Setting arr[10] creates a sparse array with empty slots. The length becomes 11 (indices 0-10). Slots 3-9 are empty (not undefined)."
        },
        {
          question: "What does this code output?",
          code: `console.log(typeof NaN)`,
          options: ["\"NaN\"", "\"undefined\"", "\"number\"", "\"object\""],
          correct: 2,
          explanation: "NaN (Not a Number) is paradoxically of type 'number'. Use Number.isNaN() to check for NaN, not typeof."
        },
        {
          question: "What does this code output?",
          code: `console.log(NaN === NaN)`,
          options: ["true", "false", "NaN", "Error"],
          correct: 1,
          explanation: "NaN is the only value in JavaScript that is not equal to itself. Use Number.isNaN(x) instead of x === NaN."
        },
        {
          question: "What does this code output?",
          code: `let x = 1\nlet y = x++\nconsole.log(x, y)`,
          options: ["1 1", "2 1", "2 2", "1 2"],
          correct: 1,
          explanation: "x++ returns the original value THEN increments. So y gets 1, then x becomes 2. Use ++x for pre-increment."
        },
        {
          question: "What does this code output?",
          code: `console.log(\"b\" + \"a\" + +\"a\" + \"a\")`,
          options: ["\"baaa\"", "\"baNaNa\"", "\"ba1a\"", "Error"],
          correct: 1,
          explanation: "+\"a\" tries to convert 'a' to a number, resulting in NaN. So: 'b' + 'a' + NaN + 'a' = 'baNaNa'."
        },
        {
          question: "What does this code output?",
          code: `const nums = [10, 5, 40, 25, 100]\nconsole.log(nums.sort())`,
          options: ["[5, 10, 25, 40, 100]", "[10, 100, 25, 40, 5]", "[100, 40, 25, 10, 5]", "Error"],
          correct: 1,
          explanation: "sort() converts elements to strings and sorts lexicographically. '10' < '5' because '1' < '5'. Always use sort((a, b) => a - b) for numbers."
        },
        {
          question: "What does this code output?",
          code: `const user = { name: \"Ian\" }\nuser.name = \"John\"\nconsole.log(user.name)`,
          options: ["\"Ian\"", "\"John\"", "Error - const is immutable", "undefined"],
          correct: 1,
          explanation: "const prevents reassignment, not mutation. You can change object properties. user = {} would throw an error, but user.name = 'John' is fine."
        },
        {
          question: "What does this code output?",
          code: `console.log(x)\nlet x = 5`,
          options: ["undefined", "5", "ReferenceError", "null"],
          correct: 2,
          explanation: "let and const have a Temporal Dead Zone. They're hoisted but not initialized, so accessing before declaration throws ReferenceError."
        },
        {
          question: "What does this code output?",
          code: `sayHi()\nvar sayHi = function() {\n  console.log(\"Hi\")\n}`,
          options: ["\"Hi\"", "undefined", "TypeError", "ReferenceError"],
          correct: 2,
          explanation: "Function expressions are hoisted as undefined. Calling undefined() throws TypeError. Function declarations would work (fully hoisted)."
        },
        {
          question: "What does this code output?",
          code: `const obj = { a: 1 }\nconsole.log(delete obj.a)\nconsole.log(obj.a)`,
          options: ["true, undefined", "false, 1", "true, 1", "undefined, undefined"],
          correct: 0,
          explanation: "delete removes object properties and returns true. After deletion, accessing obj.a returns undefined."
        }
      ],
      'js-concepts': [
        {
          question: "What is a closure in JavaScript?",
          options: [
            "A function that closes the browser",
            "A function that remembers variables from its outer scope",
            "A function without parameters",
            "A function that cannot be called twice"
          ],
          correct: 1,
          explanation: "A closure is a function that retains access to variables from its surrounding (lexical) scope, even after the outer function has returned."
        },
        {
          question: "What does this code output?",
          code: `function outer() {\n  let count = 0\n  return function() {\n    count++\n    return count\n  }\n}\nconst fn = outer()\nconsole.log(fn(), fn(), fn())`,
          options: ["1 1 1", "1 2 3", "0 1 2", "undefined"],
          correct: 1,
          explanation: "This is a closure. The inner function remembers the count variable from outer(). Each call increments and returns the same count."
        },
        {
          question: "What runs first: microtasks or macrotasks?",
          options: ["Macrotasks", "Microtasks", "They run simultaneously", "Random order"],
          correct: 1,
          explanation: "Microtasks (Promises) run before macrotasks (setTimeout) after the current call stack is empty. This is why Promise.then() executes before setTimeout(..., 0)."
        },
        {
          question: "What does call() do?",
          options: [
            "Creates a new function",
            "Invokes a function with a specific 'this' value",
            "Delays function execution",
            "Copies a function"
          ],
          correct: 1,
          explanation: "call() invokes a function immediately with a specified 'this' value and individual arguments. Similar to apply() which takes an array of arguments."
        },
        {
          question: "What is the difference between == and ===?",
          options: [
            "No difference",
            "=== is faster",
            "== coerces types, === doesn't",
            "=== only works with numbers"
          ],
          correct: 2,
          explanation: "== (loose equality) coerces types before comparing (5 == \"5\" is true). === (strict equality) compares both value AND type without coercion."
        },

    // Quiz State
    let currentQuestions = [];
    let currentQuestionIndex = 0;
    let score = 0;
    let selectedCategory = 'all';
    let selectedSize = 10;
    let answered = false;

    // DOM Elements
    const startScreen = document.getElementById('start-screen');
    const quizScreen = document.getElementById('quiz-screen');
    const resultsScreen = document.getElementById('results-screen');
    const questionNumber = document.getElementById('question-number');
    const questionText = document.getElementById('question-text');
    const codeBlock = document.getElementById('code-block');
    const optionsContainer = document.getElementById('options');
    const explanation = document.getElementById('explanation');
    const explanationText = document.getElementById('explanation-text');
    const nextBtn = document.getElementById('next-btn');
    const progressFill = document.getElementById('progress-fill');
    const currentScoreEl = document.getElementById('current-score');
    const totalQuestionsEl = document.getElementById('total-questions');

    // Category Selection
    document.querySelectorAll('.category-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedCategory = btn.dataset.category;
      });
    });

    // Size Selection
    document.querySelectorAll('.size-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedSize = parseInt(btn.dataset.size);
      });
    });

    function shuffleArray(array) {
      const shuffled = [...array];
      for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }
      return shuffled;
    }

    function startQuiz() {
      // Gather questions based on category
      if (selectedCategory === 'all') {
        currentQuestions = shuffleArray(Object.values(questions).flat());
      } else {
        currentQuestions = shuffleArray(questions[selectedCategory] || []);
      }

      // Limit to selected size (0 means all)
      if (selectedSize > 0) {
        currentQuestions = currentQuestions.slice(0, selectedSize);
      }

      if (currentQuestions.length === 0) {
        alert('No questions available for this category!');
        return;
      }

      currentQuestionIndex = 0;
      score = 0;
      
      startScreen.classList.add('hidden');
      resultsScreen.classList.add('hidden');
      quizScreen.classList.remove('hidden');

      totalQuestionsEl.textContent = currentQuestions.length;
      currentScoreEl.textContent = '0';

      showQuestion();
    }

    function showQuestion() {
      answered = false;
      nextBtn.disabled = true;
      explanation.classList.remove('show');

      const q = currentQuestions[currentQuestionIndex];
      
      questionNumber.textContent = `Question ${currentQuestionIndex + 1} of ${currentQuestions.length}`;
      questionText.textContent = q.question;

      if (q.code) {
        codeBlock.textContent = q.code;
        codeBlock.classList.remove('hidden');
      } else {
        codeBlock.classList.add('hidden');
      }

      // Update progress
      const progress = ((currentQuestionIndex) / currentQuestions.length) * 100;
      progressFill.style.width = `${progress}%`;

      // Render options
      optionsContainer.innerHTML = '';
      const letters = ['A', 'B', 'C', 'D'];
      q.options.forEach((option, index) => {
        const optionEl = document.createElement('div');
        optionEl.className = 'option';
        optionEl.innerHTML = `
          <span class="option-letter">${letters[index]}</span>
          <span>${escapeHtml(option)}</span>
        `;
        optionEl.addEventListener('click', () => selectOption(index));
        optionsContainer.appendChild(optionEl);
      });
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function selectOption(selectedIndex) {
      if (answered) return;
      answered = true;

      const q = currentQuestions[currentQuestionIndex];
      const options = optionsContainer.querySelectorAll('.option');

      options.forEach((opt, index) => {
        opt.classList.add('disabled');
        if (index === q.correct) {
          opt.classList.add('correct');
        } else if (index === selectedIndex) {
          opt.classList.add('incorrect');
        }
      });

      if (selectedIndex === q.correct) {
        score++;
        currentScoreEl.textContent = score;
      }

      explanationText.textContent = q.explanation;
      explanation.classList.add('show');
      nextBtn.disabled = false;

      // Update button text for last question
      if (currentQuestionIndex === currentQuestions.length - 1) {
        nextBtn.textContent = 'See Results';
      }
    }

    function nextQuestion() {
      currentQuestionIndex++;

      if (currentQuestionIndex >= currentQuestions.length) {
        showResults();
      } else {
        nextBtn.textContent = 'Next Question';
        showQuestion();
      }
    }

    function showResults() {
      quizScreen.classList.add('hidden');
      resultsScreen.classList.remove('hidden');

      const percentage = Math.round((score / currentQuestions.length) * 100);
      document.getElementById('final-score').textContent = `${percentage}%`;

      let message = '';
      if (percentage === 100) {
        message = '🎉 Perfect! You\'re interview-ready!';
      } else if (percentage >= 80) {
        message = '🌟 Great job! Almost there!';
      } else if (percentage >= 60) {
        message = '👍 Good effort! Keep studying!';
      } else if (percentage >= 40) {
        message = '📚 Review the concepts and try again!';
      } else {
        message = '💪 Don\'t give up! Check out the study guide!';
      }

      document.getElementById('results-message').textContent = message;
    }

    function resetQuiz() {
      resultsScreen.classList.add('hidden');
      startScreen.classList.remove('hidden');
      nextBtn.textContent = 'Next Question';
    }
  </script>
